<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Заявка отправлена — ИЖОРА</title>
  <link rel="icon" href="./favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="./style/reset.css">
  <link rel="stylesheet" href="./style/style.css">
  <link rel="stylesheet" href="./fonts/fonts.css">
  <style>
    .thanks {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      background: #2c3e2d;
    }
    .thanks__inner {
      padding: 40px;
    }
    .thanks__title {
      font-size: 36px;
      color: #fff;
      margin-bottom: 20px;
      font-family: 'Vetrino', serif;
    }
    .thanks__text {
      font-size: 18px;
      color: rgba(255,255,255,0.7);
      margin-bottom: 30px;
    }
    .thanks__link {
      color: #fff;
      text-decoration: underline;
      font-size: 16px;
    }
  </style>
</head>
<body class="page">
  <section class="thanks">
    <div class="thanks__inner">
      <h1 class="thanks__title">Спасибо за заявку!</h1>
      <p class="thanks__text">Наш специалист свяжется с Вами в ближайшее время</p>
      <a href="/" class="thanks__link">Вернуться на главную</a>
    </div>
  </section>
</body>
</html>
